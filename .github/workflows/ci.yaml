name: "Continuous Integration & DevSecOps Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write      
  contents: read       
  packages: write      

jobs:
  security-and-quality:
    name: "Code Quality & Security Scan"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Lint with Ruff"
        run: |
          pip install ruff
          ruff check app/
      
      - name: "🧪 Run Unit Tests"
        run: |
          pip install pytest fastapi httpx prometheus_client
          python -m pytest app/test_main.py  

      - name: "Check for Secrets with GitLeaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-secure-image:
    name: "📦 Docker Build & Container Security"
    needs: security-and-quality
    runs-on: ubuntu-latest

    steps:
      - name: "🗂️ Checkout Repository"
        uses: actions/checkout@v4

      # AWS OIDC Kimlik Doğrulama
      - name: "🔑 Configure AWS Credentials via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          aws-region: eu-central-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      # GHCR Login önce yapılmalı — Trivy pull için gerekebilir
      - name: "🔓 Login to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      
      - name: "🐳 Build Docker Image"
        run: |
          docker build -f app/Dockerfile -t ghcr.io/${{ github.repository }}:${{ github.sha }} .
          docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:latest

      
      - name: "🛡️ Run Trivy Vulnerability Scanner"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          trivyignore-file: '.trivyignore'

      
      - name: "🚀 Push Image to GHCR"
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest
      
      
      - name: "📋 Generate SBOM with Syft"
        uses: anchore/sbom-action@v0.18.0
        with:
          image: 'ghcr.io/${{ github.repository }}:${{ github.sha }}'
          output-file: 'sbom.json'
          upload-artifact: true

  deploy-to-minikube:
    name: "🚀 Continuous Deployment (Helm & Minikube)"
    needs: build-and-secure-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: "🗂️ Checkout Repository"
        uses: actions/checkout@v4

      
      - name: "🔑 Configure AWS Credentials via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          aws-region: eu-central-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      
      - name: "🌐 Get GitHub Actions Runner Public IP"
        id: ip
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "runner_ip=${RUNNER_IP}" >> $GITHUB_OUTPUT

      
      - name: "🔓 Whitelist GitHub Runner IP in Security Group"
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32

      
      - name: "🌐 Deploy to EC2 Minikube via SSH & Helm"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=$HOME/.kube/config
            cd ~/insider_devops_case_study
            
            # Local değişiklikleri yoksay ve GitHub'daki en güncel haliyle zorla eşitle
            git fetch origin
            git reset --hard origin/main

            # Helm kurulumu (Tüm satırların sonunda \ olduğuna dikkat et)
            helm upgrade --install insider-dev ./insider-app \
              -f insider-app/values-prod.yaml \
              --set image.repository=ghcr.io/${{ github.repository }} \
              --set image.tag=${{ github.sha }} \
              --set image.pullPolicy=Always \
              --namespace insider-app

     
      - name: "🔒 Revoke GitHub Runner IP from Security Group"
        if: always() 
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32