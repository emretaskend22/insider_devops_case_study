environment: "production"

# 2.2 High Availability: Canlı ortamda yüksek erişilebilirlik için minimum 3 pod ile başlıyoruz. Bu, tek bir pod'un arızalanması durumunda bile uygulamanın çalışmaya devam etmesini sağlar.
replicaCount: 3

# 🚀 Canlı ortam imaj politikası 
image:
  repository: emretaskend/insider-app 
  tag: latest 
  pullPolicy: Always

service:
  type: NodePort
  port: 8080

# 2.3 Resources: Ani trafik yüklerini için kaynak sınırlarını Vertical optimize ettik
resources:
  limits:
    cpu: 500m        # Yarım çekirdek (Max çıkabileceği seviye)
    memory: 512Mi    # 512 MB RAM (Max çıkabileceği seviye)
  requests:
    cpu: 200m        # Kümden garanti olarak istediği işlemci gücü
    memory: 256Mi    # Kümeden garanti olarak istediği RAM

# 2.5 Production-Ready Autoscaling Configuration (HPA)
hpa:
  enabled: true
  minReplicas: 3      
  maxReplicas: 10     # Ani trafik artışında yatayda Horizontal 10 poda kadar genişler
  targetCPU: 75       # CPU kullanımı %75'i geçtiğinde yeni pod eklenir

serviceMonitor:
  enabled: true
  labels:
    release: prometheus-stack
  interval: 15s
  path: /metrics
  port: http