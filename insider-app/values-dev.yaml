# Geliştirme (Test) ortamı konfigürasyonu
environment: "development"

# Maliyet ve kaynak tasarrufu için test ortamında tek pod 
replicaCount: 1

# 🛠️ Lokal test mimarisi 
image:
  repository: insider-app
  tag: local
  pullPolicy: Never

# 2.3 Resources: Test ortamı için hafif kaynak sınırları
resources:
  limits:
    cpu: "200m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# 2.5 Production-Ready Autoscaling Configuration Bonus 
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3      # t3.small kaynak kısıtı nedeniyle max 3 replica idealdir
  targetCPU: 70       # Pod bazlı ortalama CPU kullanımı %70'i geçerse yeni pod tetiklenir