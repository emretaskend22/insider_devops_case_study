# 📉 monitoring-values.yaml: t3.small sunucusu için Prometheus + Grafana ayarları

prometheus:
  prometheusSpec:
    retention: 1d
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"

grafana:
  admin:
    existingSecret: "grafana-admin-secret"
    adminPasswordKey: "admin-password"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"

nodeExporter:
  enabled: true
kubeStateMetrics:
  enabled: true
prometheusOperator:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"